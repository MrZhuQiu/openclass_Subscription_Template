;不要随意改变关键字，否则会导致出错
;自定义ACL4SSR规则模板
;功能说明：
; - 大陆直连 + BT/PT专属直连（避免代理拖慢下载速度）
; - 仅微软云盘分流（非全量微软服务，减少无用规则）
; - 双测速分组：谷歌/YouTube独立测速，适配不同场景
; - 地区节点自动分组：港/台/新/日/韩/美/澳，自动匹配节点名
; - 细分场景：奈飞/迪士尼/AI/国际大厂专属分组，精准分流

;==================== 分流规则集 ====================
; 1. 基础拦截&局域网
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/LocalAreaNetwork.list
ruleset=🛑 全球拦截,rules/ACL4SSR/Clash/BanAD.list
ruleset=🍃 应用净化,rules/ACL4SSR/Clash/BanProgramAD.list

; 2. BT/PT专属：强制走直连，避免代理影响PT下载
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/Ruleset/PrivateTracker.list

; 3. 细分场景规则
ruleset=☁️ OneDrive云盘,rules/ACL4SSR/Clash/OneDrive.list
ruleset=🤖 AI服务,rules/ACL4SSR/Clash/Ruleset/OpenAi.list
ruleset=🍿 奈飞专属,rules/ACL4SSR/Clash/Ruleset/Netflix.list
ruleset=🏰 迪士尼专属,rules/ACL4SSR/Clash/Ruleset/Disney.list
; 国际大厂规则（若缺少该文件，可自行添加GitHub/AWS等对应域名规则）
ruleset=🏭 国际大厂,rules/ACL4SSR/Clash/Ruleset/GlobalCompany.list

; 4. 国内直连规则
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/GoogleCN.list
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/Ruleset/SteamCN.list
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/ChinaDomain.list
ruleset=🎯 大陆直连,rules/ACL4SSR/Clash/ChinaCompanyIp.list

; 5. 最终规则
ruleset=🎯 大陆直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;==================== 策略分组定义 ====================
; 1. 双测速自动选择（谷歌/YouTube独立测速）
custom_proxy_group=♻️ 自动测速(谷歌)`url-test`.*`https://connectivitycheck.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 自动测速(YouTube)`url-test`.*`https://www.youtube.com/generate_204`300,,50

; 2. 地区节点自动分组（自动匹配节点名，不区分中英文）
custom_proxy_group=🇭🇰 香港`select`.*`(?i)hongkong|香港`
custom_proxy_group=🇹🇼 台湾`select`.*`(?i)taiwan|台湾`
custom_proxy_group=🇸🇬 新加坡`select`.*`(?i)singapore|新加坡|狮城`
custom_proxy_group=🇯🇵 日本`select`.*`(?i)japan|日本`
custom_proxy_group=🇰🇷 韩国`select`.*`(?i)korea|韩国`
custom_proxy_group=🇺🇸 美国`select`.*`(?i)usa|美国|美利坚`
custom_proxy_group=🇦🇺 澳洲`select`.*`(?i)australia|澳洲|澳大利亚`

; 3. 总节点选择
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇰🇷 韩国`[]🇺🇸 美国`[]🇦🇺 澳洲`.*

; 4. 细分场景分组
custom_proxy_group=🍿 奈飞专属`select`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇰🇷 韩国`[]🇺🇸 美国`[]🇦🇺 澳洲`[]🎯 大陆直连`.*
custom_proxy_group=🏰 迪士尼专属`select`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇰🇷 韩国`[]🇺🇸 美国`[]🇦🇺 澳洲`[]🎯 大陆直连`.*
custom_proxy_group=🤖 AI服务`select`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🎯 大陆直连`.*
custom_proxy_group=🏭 国际大厂`select`[]🎯 大陆直连`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`.*
custom_proxy_group=☁️ OneDrive云盘`select`[]🎯 大陆直连`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`.*

; 5. 基础功能分组
custom_proxy_group=🎯 大陆直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 大陆直连`[]♻️ 自动测速(谷歌)`[]♻️ 自动测速(YouTube)`.*

;==================== 规则生成开关 ====================
enable_rule_generator=true
overwrite_original_rules=true
